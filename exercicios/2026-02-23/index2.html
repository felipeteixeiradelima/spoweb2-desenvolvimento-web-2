<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Lista de Exercícios - Aula 2</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header>
            <h1>Lista de Exercícios - Aula 2</h1>
        </header>

        <main class="container">
            <div class="card">
                <h2>Exercício A - Mudança de Família da Fonte</h2>

                <div class="card-inputs">
                    <div class="input-group">
                        <label for="input1ExA">Família</label>
                        <input
                            type="text"
                            id="input1ExA"
                            placeholder="Digite uma família de fontes"
                        />
                    </div>
                </div>

                <div class="card-buttons">
                    <button class="btn-executar" onclick="executarItemA()">
                        Executar
                    </button>
                    <button class="btn-resetar" onclick="resetarItemA()">
                        Resetar
                    </button>
                </div>

                <div class="resultado" id="resultadoExA">
                    <p>O resultado será aplicado neste texto.</p>
                </div>
            </div>

            <div class="card">
                <h2>Exercício B - Mudança de Tamanho da Fonte</h2>

                <div class="card-inputs">
                    <div class="input-group">
                        <label for="input1ExB">Tamanho</label>
                        <input
                            type="number"
                            id="input1ExB"
                            placeholder="Digite um tamanho em píxels"
                            min="0"
                        />
                    </div>
                </div>

                <div class="card-buttons">
                    <button class="btn-executar" onclick="executarItemB()">
                        Executar
                    </button>
                    <button class="btn-resetar" onclick="resetarItemB()">
                        Resetar
                    </button>
                </div>

                <div class="resultado" id="resultadoExB">
                    <p>O resultado será aplicado neste texto.</p>
                </div>
            </div>
        </main>

        <script src="js/main2.js"></script>
    </body>
</html>
